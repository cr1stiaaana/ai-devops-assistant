version: 0.2

env:
  variables:
    TF_VERSION: "1.9.0"

phases:
  install:
    commands:
      - wget -q https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
      - unzip terraform_1.9.0_linux_amd64.zip
      - mv terraform /usr/local/bin/

  build:
    commands:
      - cd terraform
      - terraform init
      - terraform validate
      - terraform apply -auto-approve
